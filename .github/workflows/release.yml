name: Release

# Publishes a GitHub Release with the built firmware attached whenever a
# version tag (vX.Y.Z) is pushed. There is no on-device updater polling this
# (sdk_apps/why2025_ota, the WHY-team app that would have done that, is
# archived -- Archive/sdk_apps/why2025_ota/ -- and was never enabled here):
# the release exists as a versioned, CI-built artifact for provenance, and
# flashing badgevms.bin onto a badge is a manual esptool step -- see
# docs/guides/Flashing.md for the exact command.
#
# Cut a release with:
#   git tag v1.0.0 && git push origin v1.0.0
# (the tag drives both PROJECT_VER and the release name; keep them in sync).
# See docs/guides/Releases.md for the full cut-a-release checklist.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish firmware release
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.1
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe --tags` resolves the exact tag
          # into PROJECT_VER (the version the badge compares against).
          fetch-depth: 0

      - name: Mark workspace as safe (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build firmware
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py build

      - name: Verify firmware artifact exists
        shell: bash
        run: |
          test -f build/badgevms.bin || { echo "build/badgevms.bin missing"; exit 1; }
          ls -l build/badgevms.bin

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Asset name must stay "badgevms.bin" — the badge matches on it exactly
          # (GITHUB_FIRMWARE_ASSET in sdk_apps/why2025_ota/ota_update.c).
          files: build/badgevms.bin
          generate_release_notes: true
